<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior Routine | Discipline Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --accent: #6366f1;
            --green: #10b981;
            --gold: #f59e0b;
        }
        body { background-color: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card-glass { background: var(--surface); border: 1px solid rgba(99,102,241,0.2); border-radius: 16px; }
        .task-checked { text-decoration: line-through; opacity: 0.5; }
        .nav-active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        /* Smooth transitions */
        .screen { display: none; animation: fadeIn 0.3s ease-in-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full bg-[#111827] border-b border-indigo-900/30 z-50 flex justify-around">
        <button onclick="showScreen('home')" id="nav-home" class="nav-active flex-1 py-4 text-xs font-bold uppercase tracking-widest"><i class="fas fa-khanda mb-1 block text-lg"></i>Latihan</button>
        <button onclick="showScreen('log')" id="nav-log" class="flex-1 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest"><i class="fas fa-history mb-1 block text-lg"></i>Riwayat</button>
        <button onclick="showScreen('stats')" id="nav-stats" class="flex-1 py-4 text-xs font-bold text-gray-500 uppercase tracking-widest"><i class="fas fa-chart-line mb-1 block text-lg"></i>Statistik</button>
    </nav>

    <main class="mt-20 px-4 max-w-md mx-auto">

        <div id="screen-home" class="screen active">
            <div class="card-glass p-5 mb-6 bg-gradient-to-br from-indigo-900/20 to-transparent">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 id="rank-name" class="text-xl font-bold text-white">Warrior Mode 🔥</h2>
                        <p class="text-xs text-indigo-300">Target: Berat Badan Ideal</p>
                    </div>
                    <div id="level-tag" class="bg-amber-500 text-black px-3 py-1 rounded-full text-xs font-black">LVL 1</div>
                </div>
                <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-400">
                    <span>XP PROGRESS</span>
                    <span id="xp-text">0 / 100 XP</span>
                </div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                    <div id="xp-bar" class="bg-indigo-500 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="card-glass p-3 text-center">
                    <div class="text-amber-500 font-bold text-lg" id="streak-val">0</div>
                    <div class="text-[9px] text-gray-400 uppercase">Streak</div>
                </div>
                <div class="card-glass p-3 text-center">
                    <div class="text-emerald-500 font-bold text-lg" id="done-count">0/13</div>
                    <div class="text-[9px] text-gray-400 uppercase">Selesai</div>
                </div>
                <div class="card-glass p-3 text-center">
                    <div class="text-indigo-400 font-bold text-lg" id="total-xp-val">0</div>
                    <div class="text-[9px] text-gray-400 uppercase">Total XP</div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="routine-group">
                    <h3 class="text-xs font-black text-gray-500 mb-2 px-1">🌅 MORNING RITUAL</h3>
                    <div id="morning-tasks" class="space-y-2"></div>
                </div>
                <div class="routine-group">
                    <h3 class="text-xs font-black text-gray-500 mb-2 px-1">💪 WORKOUT KAMAR</h3>
                    <div id="workout-tasks" class="space-y-2"></div>
                </div>
                <div class="routine-group">
                    <h3 class="text-xs font-black text-gray-500 mb-2 px-1">🌙 NIGHT RECOVERY</h3>
                    <div id="night-tasks" class="space-y-2"></div>
                </div>
            </div>

            <button onclick="finalizeDay()" id="btn-finalize" class="w-full mt-8 bg-indigo-600 py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/20 disabled:opacity-50 transition-all">
                SELESAIKAN MISI HARI INI ⚡
            </button>
            <button onclick="resetCurrentDay()" class="w-full mt-3 text-gray-500 text-xs py-2">Reset data hari ini</button>
        </div>

        <div id="screen-log" class="screen">
            <h2 class="text-xl font-bold mb-4 px-1">Riwayat Perjalanan</h2>
            <div id="log-container" class="space-y-3"></div>
        </div>

        <div id="screen-stats" class="screen">
            <h2 class="text-xl font-bold mb-4 px-1">Statistik Tubuh</h2>
            <div class="card-glass p-5 mb-4">
                <p class="text-xs text-gray-400 mb-4 uppercase font-bold">Progress Berat Badan</p>
                <div class="flex items-center gap-4 mb-6">
                    <input type="number" id="weight-input" placeholder="00.0" class="flex-1 bg-gray-800 border-none rounded-lg p-3 text-center text-xl font-bold">
                    <button onclick="addWeight()" class="bg-emerald-600 px-6 py-3 rounded-lg font-bold text-sm">Update</button>
                </div>
                <div id="weight-history" class="space-y-2"></div>
            </div>
            
            <div class="card-glass p-5">
                <p class="text-xs text-gray-400 mb-2 uppercase font-bold">Motivasi</p>
                <p id="quote-display" class="italic text-indigo-200 text-sm leading-relaxed"></p>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-2 rounded-full text-sm font-bold opacity-0 transition-opacity pointer-events-none"></div>

    <script>
        // DATA CONFIG
        const TASKS = {
            morning: [
                { id: 'm1', text: "Minum 500ml Air Putih", xp: 10 },
                { id: 'm2', text: "Light Stretching (10m)", xp: 15 },
                { id: 'm3', text: "Paparan Cahaya Matahari", xp: 10 },
                { id: 'm4', text: "Daily Planning (3 Prioritas)", xp: 15 }
            ],
            workout: [
                { id: 'w1', text: "Bodyweight Squats (15x)", xp: 20 },
                { id: 'w2', text: "Push-ups (12x)", xp: 20 },
                { id: 'w3', text: "Plank (45 Detik)", xp: 15 },
                { id: 'w4', text: "Lunges (10x per kaki)", xp: 20 },
                { id: 'w5', text: "Mountain Climbers (30s)", xp: 25 }
            ],
            night: [
                { id: 'n1', text: "Digital Detox (No HP)", xp: 15 },
                { id: 'n2', text: "Persiapan Baju & Alat Besok", xp: 10 },
                { id: 'n3', text: "Journaling / Mind Dump", xp: 15 },
                { id: 'n4', text: "Pernapasan Diafragma", xp: 10 }
            ]
        };

        const QUOTES = [
            "Disiplin adalah jembatan antara cita-cita dan pencapaian.",
            "Tubuhmu adalah satu-satunya tempat tinggalmu. Jaga itu.",
            "Jangan berhenti saat lelah, berhentilah saat selesai.",
            "Satu langkah kecil hari ini adalah kemajuan besar besok."
        ];

        // STATE MANAGEMENT
        let state = JSON.parse(localStorage.getItem('warrior_state')) || {
            totalXp: 0,
            streak: 0,
            lastDate: null,
            history: [],
            weights: [],
            dailyChecks: {}, // Key: YYYY-MM-DD
            dayFinalized: false
        };

        const getTodayKey = () => new Date().toISOString().split('T')[0];

        function save() {
            localStorage.setItem('warrior_state', JSON.stringify(state));
            render();
        }

        // ACTIONS
        function toggleTask(id, xp) {
            const today = getTodayKey();
            if (!state.dailyChecks[today]) state.dailyChecks[today] = [];
            
            const index = state.dailyChecks[today].indexOf(id);
            if (index > -1) {
                state.dailyChecks[today].splice(index, 1);
                state.totalXp -= xp;
            } else {
                state.dailyChecks[today].push(id);
                state.totalXp += xp;
                showToast(`+${xp} XP!`);
            }
            save();
        }

        function finalizeDay() {
            const today = getTodayKey();
            const checkedCount = state.dailyChecks[today]?.length || 0;
            if (checkedCount === 0) return;

            if (state.lastDate !== today) {
                // Streak Logic
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yestKey = yesterday.toISOString().split('T')[0];
                
                if (state.lastDate === yestKey) state.streak++;
                else if (!state.lastDate || state.lastDate !== today) state.streak = 1;

                state.history.unshift({
                    date: today,
                    tasks: checkedCount,
                    total: 13,
                    xpGained: checkedCount * 10 // approximation
                });
                
                state.lastDate = today;
                showToast("Misi Selesai! Streak bertambah! 🔥");
            }
            save();
        }

        function addWeight() {
            const val = document.getElementById('weight-input').value;
            if (!val) return;
            state.weights.unshift({
                val: parseFloat(val).toFixed(1),
                date: new Date().toLocaleDateString('id-ID', {day:'numeric', month:'short'})
            });
            document.getElementById('weight-input').value = '';
            showToast("Berat dicatat! 📝");
            save();
        }

        // RENDERING
        function render() {
            const today = getTodayKey();
            const checks = state.dailyChecks[today] || [];
            
            // Progress
            const level = Math.floor(state.totalXp / 100) + 1;
            const xpInLevel = state.totalXp % 100;
            const ranks = ["Pemula", "Aktif", "Disiplin", "Warrior", "Elite", "Legend"];
            
            document.getElementById('rank-name').innerText = `${ranks[Math.min(level-1, 5)]} Mode 🔥`;
            document.getElementById('level-tag').innerText = `LVL ${level}`;
            document.getElementById('xp-bar').style.width = `${xpInLevel}%`;
            document.getElementById('xp-text').innerText = `${xpInLevel} / 100 XP`;
            document.getElementById('streak-val').innerText = state.streak;
            document.getElementById('done-count').innerText = `${checks.length}/13`;
            document.getElementById('total-xp-val').innerText = state.totalXp;

            // Tasks
            renderTaskGroup('morning-tasks', TASKS.morning, checks);
            renderTaskGroup('workout-tasks', TASKS.workout, checks);
            renderTaskGroup('night-tasks', TASKS.night, checks);

            // History & Weight
            renderHistory();
            renderWeightList();

            // Button State
            document.getElementById('btn-finalize').disabled = (state.lastDate === today);
            if (state.lastDate === today) document.getElementById('btn-finalize').innerText = "MISI HARI INI SELESAI ✅";
            
            document.getElementById('quote-display').innerText = QUOTES[new Date().getDay() % QUOTES.length];
        }

        function renderTaskGroup(containerId, data, checks) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(t => {
                const isChecked = checks.includes(t.id);
                return `
                    <div onclick="toggleTask('${t.id}', ${t.xp})" class="card-glass p-4 flex items-center justify-between cursor-pointer hover:bg-indigo-900/10 transition">
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded border-2 border-indigo-500 flex items-center justify-center ${isChecked ? 'bg-indigo-500' : ''}">
                                ${isChecked ? '<i class="fas fa-check text-[10px] text-white"></i>' : ''}
                            </div>
                            <span class="text-sm ${isChecked ? 'task-checked text-gray-500' : 'text-gray-200'}">${t.text}</span>
                        </div>
                        <span class="text-[10px] font-bold text-amber-500">+${t.xp} XP</span>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('log-container');
            if (state.history.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 text-xs py-10">Belum ada riwayat. Selesaikan misi pertamamu!</p>`;
                return;
            }
            container.innerHTML = state.history.map(h => `
                <div class="card-glass p-4 flex justify-between items-center">
                    <div>
                        <div class="text-sm font-bold">${h.date}</div>
                        <div class="text-[10px] text-gray-500">${h.tasks} Task Selesai</div>
                    </div>
                    <div class="text-emerald-500 font-bold text-sm">${Math.round((h.tasks/h.total)*100)}%</div>
                </div>
            `).join('');
        }

        function renderWeightList() {
            const container = document.getElementById('weight-history');
            container.innerHTML = state.weights.slice(0, 5).map(w => `
                <div class="flex justify-between text-xs py-2 border-b border-gray-800">
                    <span class="text-gray-400">${w.date}</span>
                    <span class="font-bold text-indigo-300">${w.val} kg</span>
                </div>
            `).join('');
        }

        // UTILS
        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${name}`).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-indigo-400'));
            document.querySelectorAll('nav button').forEach(b => b.classList.add('text-gray-500'));
            
            const activeBtn = document.getElementById(`nav-${name}`);
            activeBtn.classList.add('nav-active');
            activeBtn.classList.remove('text-gray-500');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function resetCurrentDay() {
            if(confirm("Hapus progress hari ini?")) {
                const today = getTodayKey();
                delete state.dailyChecks[today];
                state.lastDate = null;
                save();
            }
        }

        // INIT
        window.onload = render;
    </script>
</body>
</html>
