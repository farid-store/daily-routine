<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Master | Discipline Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .checked { text-decoration: line-through; opacity: 0.6; }
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">ROUTINE MASTER</h1>
            <p class="text-gray-400" id="currentDate"></p>
            
            <div class="mt-6">
                <div class="flex justify-between mb-2 text-sm">
                    <span>Daily Discipline Progress</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-4">
                    <div id="progressBar" class="bg-blue-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="space-y-6">
            
            <section class="card p-5 rounded-2xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4 flex items-center text-yellow-400">
                    <i class="fas fa-sun mr-2"></i> Morning Routine (15-30m)
                </h2>
                <div class="space-y-3" id="morningList">
                    </div>
            </section>

            <section class="card p-5 rounded-2xl shadow-xl border-l-4 border-red-500">
                <h2 class="text-xl font-semibold mb-4 flex items-center text-red-400">
                    <i class="fas fa-dumbbell mr-2"></i> Bedroom Workout
                </h2>
                <div class="space-y-3" id="workoutList"></div>
            </section>

            <section class="card p-5 rounded-2xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4 flex items-center text-indigo-400">
                    <i class="fas fa-moon mr-2"></i> Night Routine (15-30m)
                </h2>
                <div class="space-y-3" id="nightList"></div>
            </section>

        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="resetDaily()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold transition">
                RESET DAY
            </button>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition">
                <i class="fas fa-print"></i>
            </button>
        </div>
    </div>

    <script>
        const routines = {
            morning: [
                "Minum 500ml Air Putih",
                "Light Stretching (10 Menit)",
                "Paparan Cahaya Matahari",
                "Daily Planning (3 Priority)"
            ],
            workout: [
                "Bodyweight Squats (15x)",
                "Push-ups (12x)",
                "Plank (45 Detik)",
                "Lunges (10x per kaki)",
                "Mountain Climbers (30 Detik)"
            ],
            night: [
                "Digital Detox (No HP)",
                "Persiapan Baju & Alat Besok",
                "Journaling/Mind Dump",
                "Pernapasan Diafragma (4-7-8)"
            ]
        };

        function init() {
            const dateOptions = { underline: 'none', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('id-ID', dateOptions);
            
            renderList('morningList', routines.morning, 'm');
            renderList('workoutList', routines.workout, 'w');
            renderList('nightList', routines.night, 'n');
            updateProgress();
        }

        function renderList(elementId, items, prefix) {
            const container = document.getElementById(elementId);
            container.innerHTML = items.map((item, index) => {
                const id = `${prefix}-${index}`;
                const checked = localStorage.getItem(id) === 'true' ? 'checked' : '';
                return `
                    <div class="flex items-center p-3 bg-slate-800 rounded-lg hover:bg-slate-750 transition cursor-pointer" onclick="toggleItem('${id}')">
                        <input type="checkbox" id="${id}" ${checked ? 'checked' : ''} class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <label class="ml-3 text-sm md:text-base ${checked ? 'checked' : ''}" id="label-${id}">${item}</label>
                    </div>
                `;
            }).join('');
        }

        function toggleItem(id) {
            const checkbox = document.getElementById(id);
            const label = document.getElementById(`label-${id}`);
            const newState = !checkbox.checked;
            
            checkbox.checked = newState;
            localStorage.setItem(id, newState);
            
            if(newState) label.classList.add('checked');
            else label.classList.remove('checked');
            
            updateProgress();
        }

        function updateProgress() {
            const total = routines.morning.length + routines.workout.length + routines.night.length;
            let completed = 0;
            
            for (let i = 0; i < localStorage.length; i++) {
                if (localStorage.getItem(localStorage.key(i)) === 'true') completed++;
            }

            const percent = Math.round((completed / total) * 100) || 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';
        }

        function resetDaily() {
            if(confirm('Mulai hari baru? Semua progress akan direset.')) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
